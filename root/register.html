<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册 - 个人云盘</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; padding: 40px; background: #f5f5f5; }
      .card { max-width: 360px; margin: 40px auto; padding: 24px 28px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
      h1 { font-size: 20px; margin: 0 0 16px; text-align: center; }
      label { display: block; margin: 12px 0 4px; font-size: 14px; }
      input[type="text"], input[type="password"] { width: 100%; padding: 8px 10px; font-size: 14px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
      button { margin-top: 16px; width: 100%; padding: 9px 0; font-size: 14px; border-radius: 4px; border: none; cursor: pointer; }
      .primary { background: #52c41a; color: #fff; }
      .secondary { background: #f0f0f0; color: #333; margin-top: 8px; }
      .error { margin-top: 8px; color: #c00; font-size: 13px; }
      .success { margin-top: 8px; color: #090; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>注册新账号</h1>
      <label for="username">用户名</label>
      <input id="username" type="text" autocomplete="username" />

      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="new-password" />

      <label for="password2">确认密码</label>
      <input id="password2" type="password" autocomplete="new-password" />

      <button class="primary" onclick="registerUser()">注册</button>
      <button class="secondary" onclick="location.href='index.html'">返回登录</button>

      <div id="msg" class="error" style="display:none"></div>
    </div>

    <script>
      async function registerUser() {
        const u = document.getElementById('username').value.trim();
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('password2').value;
        const msg = document.getElementById('msg');
        msg.style.display = 'none';
        msg.className = 'error';

        if (!u || !p1 || !p2) {
          msg.textContent = '请填写完整信息';
          msg.style.display = 'block';
          return;
        }
        if (p1 !== p2) {
          msg.textContent = '两次输入的密码不一致';
          msg.style.display = 'block';
          return;
        }

        try {
          const resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p1 })
          });
          if (!resp.ok) {
            if (resp.status === 409) {
              msg.textContent = '用户名已存在';
            } else {
              msg.textContent = '注册失败';
            }
            msg.style.display = 'block';
            return;
          }
          msg.className = 'success';
          msg.textContent = '注册成功，正在跳转到登录页...';
          msg.style.display = 'block';
          setTimeout(() => { window.location.href = '/index.html'; }, 1000);
        } catch (e) {
          msg.textContent = '网络错误，请稍后重试';
          msg.style.display = 'block';
        }
      }
    </script>
  </body>
  
</html>
