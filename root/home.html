<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的云盘</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; padding: 24px; background: #f5f5f5; }
      .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .card { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
      h1 { font-size: 20px; margin: 0; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { padding: 6px 4px; font-size: 13px; text-align: left; border-bottom: 1px solid #f0f0f0; }
      th { background: #fafafa; }
      input[type="text"], input[type="file"] { width: 100%; padding: 6px 8px; font-size: 13px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
      textarea { width: 100%; height: 80px; padding: 6px 8px; font-size: 13px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
      button { padding: 6px 10px; font-size: 13px; border-radius: 4px; border: none; cursor: pointer; }
      .primary { background: #1677ff; color: #fff; }
      .secondary { background: #52c41a; color: #fff; }
      .danger { background: #ff4d4f; color: #fff; }
      .link { background: transparent; color: #1677ff; border: none; padding: 0; }
      .msg { margin-top: 8px; font-size: 13px; }
      .msg.error { color: #c00; }
      .msg.success { color: #090; }
      .muted { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div><strong id="welcome">我的云盘</strong></div>
      <div>
        <button class="link" onclick="location.href='/index.html'">退出登录</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex; gap:8px; align-items:flex-start;">
        <div style="flex:2;">
          <div style="font-size:13px; margin-bottom:4px;">文件路径（如：note.txt 或 folder/note.txt）</div>
          <input id="uploadPath" type="text" />
        </div>
        <div style="flex:3;">
          <div style="font-size:13px; margin-bottom:4px;">文本内容</div>
          <textarea id="uploadContent"></textarea>
        </div>
        <div style="flex:0; align-self:center;">
          <button class="primary" onclick="uploadFile()">上传/保存</button>
        </div>
      </div>
      <div id="uploadMsg" class="msg" style="display:none;"></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div style="font-size:14px; margin-bottom:10px;">上传本地文件</div>
      <div style="display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap;">
        <div style="flex:2; min-width:220px;">
          <div style="font-size:13px; margin-bottom:4px;">本地文件</div>
          <input id="localFile" type="file" accept=".txt,.md,.pdf,.png,.jpg,.jpeg,.gif,.zip" />
        </div>
        <div style="flex:2; min-width:220px;">
          <div style="font-size:13px; margin-bottom:4px;">保存路径（可选，默认用文件名）</div>
          <input id="localFilePath" type="text" placeholder="例如 docs/report.pdf" />
        </div>
        <div>
          <button class="secondary" onclick="uploadLocalFile()">上传本地文件</button>
        </div>
      </div>
      <div class="muted" style="margin-top:8px;">支持格式：txt / md / pdf / png / jpg / jpeg / gif / zip，单文件最大 20MB，用户总配额 200MB。</div>
      <div id="localUploadMsg" class="msg" style="display:none;"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:14px;">我的文件</div>
        <button class="primary" onclick="loadFiles()">刷新列表</button>
      </div>
      <table id="fileTable">
        <thead>
          <tr><th>文件名</th><th>路径</th><th>大小 (字节)</th><th>更新时间</th><th>类型</th><th>操作</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="listMsg" class="msg" style="display:none;"></div>
    </div>

    <script>
      async function init() {
        try {
          const resp = await fetch('/api/me');
          if (!resp.ok) {
            window.location.href = '/index.html';
            return;
          }
          const data = await resp.json();
          if (data.ok) {
            document.getElementById('welcome').textContent = '我的云盘 - ' + data.username;
          }
        } catch (e) {
          // ignore
        }
        loadFiles();
      }

      async function uploadFile() {
        const path = document.getElementById('uploadPath').value.trim();
        const content = document.getElementById('uploadContent').value;
        const msg = document.getElementById('uploadMsg');
        msg.style.display = 'none';
        msg.className = 'msg';

        if (!path) {
          msg.textContent = '请填写文件路径';
          msg.className = 'msg error';
          msg.style.display = 'block';
          return;
        }

        try {
          const resp = await fetch('/api/files/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path, content })
          });
          if (!resp.ok) {
            const text = await resp.text();
            msg.textContent = '上传失败: ' + text;
            msg.className = 'msg error';
            msg.style.display = 'block';
            return;
          }
          msg.textContent = '保存成功';
          msg.className = 'msg success';
          msg.style.display = 'block';
          loadFiles();
        } catch (e) {
          msg.textContent = '网络错误';
          msg.className = 'msg error';
          msg.style.display = 'block';
        }
      }

      async function loadFiles() {
        const msg = document.getElementById('listMsg');
        msg.style.display = 'none';
        const tbody = document.querySelector('#fileTable tbody');
        tbody.innerHTML = '';
        try {
          const resp = await fetch('/api/files/list', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dir: '', page: 1, page_size: 100 })
          });
          if (!resp.ok) {
            msg.textContent = '加载文件列表失败';
            msg.className = 'msg error';
            msg.style.display = 'block';
            return;
          }
          const data = await resp.json();
          if (!data.ok) {
            msg.textContent = '加载文件列表失败';
            msg.className = 'msg error';
            msg.style.display = 'block';
            return;
          }
          (data.items || []).forEach(item => {
            const tr = document.createElement('tr');
            const previewBtn = item.previewable
              ? '<button class="link" onclick="downloadFile(\'' + item.path.replace(/'/g, "\\'") + '\')">查看</button> '
              : '';
            const downloadBtn = '<button class="link" onclick="rawDownloadFile(\'' + item.path.replace(/'/g, "\\'") + '\')">下载</button> ';
            tr.innerHTML = '<td>' + (item.name || '') + '</td>' +
                           '<td>' + item.path + '</td>' +
                           '<td>' + item.size + '</td>' +
                           '<td>' + formatTimestamp(item.updated_at) + '</td>' +
                           '<td>' + (item.content_type || '') + '</td>' +
                           '<td>' +
                           previewBtn + downloadBtn +
                           '<button class="danger" onclick="deleteFile(\'' + item.path.replace(/'/g, "\\'") + '\')">删除</button>' +
                           '</td>';
            tbody.appendChild(tr);
          });
        } catch (e) {
          msg.textContent = '网络错误';
          msg.className = 'msg error';
          msg.style.display = 'block';
        }
      }

      async function deleteFile(path) {
        if (!confirm('确定删除 ' + path + ' ?')) return;
        try {
          const resp = await fetch('/api/files/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path })
          });
          if (resp.ok) {
            loadFiles();
          } else {
            alert('删除失败');
          }
        } catch (e) {
          alert('网络错误');
        }
      }

      async function downloadFile(path) {
        try {
          const resp = await fetch('/api/files/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path })
          });
          if (!resp.ok) {
            alert('读取文件失败');
            return;
          }
          const data = await resp.json();
          if (!data.ok) {
            alert('读取文件失败');
            return;
          }
          document.getElementById('uploadPath').value = data.path;
          document.getElementById('uploadContent').value = data.content;
        } catch (e) {
          alert('网络错误');
        }
      }

      async function uploadLocalFile() {
        const input = document.getElementById('localFile');
        const customPath = document.getElementById('localFilePath').value.trim();
        const msg = document.getElementById('localUploadMsg');
        msg.style.display = 'none';
        msg.className = 'msg';

        if (!input.files || input.files.length === 0) {
          msg.textContent = '请选择一个本地文件';
          msg.className = 'msg error';
          msg.style.display = 'block';
          return;
        }

        const file = input.files[0];
        const path = customPath || file.name;
        const form = new FormData();
        form.append('path', path);
        form.append('file', file, file.name);

        try {
          const resp = await fetch('/api/files/upload-local', {
            method: 'POST',
            body: form
          });
          if (!resp.ok) {
            const text = await resp.text();
            msg.textContent = '上传失败: ' + text;
            msg.className = 'msg error';
            msg.style.display = 'block';
            return;
          }
          msg.textContent = '本地文件上传成功';
          msg.className = 'msg success';
          msg.style.display = 'block';
          input.value = '';
          document.getElementById('localFilePath').value = '';
          loadFiles();
        } catch (e) {
          msg.textContent = '网络错误';
          msg.className = 'msg error';
          msg.style.display = 'block';
        }
      }

      function rawDownloadFile(path) {
        window.location.href = '/api/files/raw-download?path=' + encodeURIComponent(path);
      }

      function formatTimestamp(ts) {
        if (!ts) return '';
        const d = new Date(Number(ts) * 1000);
        if (Number.isNaN(d.getTime())) return String(ts);
        return d.toLocaleString();
      }

      init();
    </script>
  </body>
  
</html>
