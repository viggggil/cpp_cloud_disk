<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的云盘</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; padding: 24px; background: #f5f5f5; margin: 0; }
      .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .layout { display: grid; grid-template-columns: 260px 1fr; gap: 16px; }
      .card { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
      .card + .card { margin-top: 16px; }
      .muted { color: #666; font-size: 12px; }
      .msg { margin-top: 8px; font-size: 13px; }
      .msg.error { color: #c00; }
      .msg.success { color: #090; }
      input[type="text"], input[type="file"], select { width: 100%; padding: 7px 8px; font-size: 13px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
      button { padding: 7px 10px; font-size: 13px; border-radius: 4px; border: none; cursor: pointer; }
      .primary { background: #1677ff; color: #fff; }
      .secondary { background: #52c41a; color: #fff; }
      .danger { background: #ff4d4f; color: #fff; }
      .link { background: transparent; color: #1677ff; padding: 0; }
      .tree-list { list-style: none; padding: 0; margin: 12px 0 0; max-height: 520px; overflow: auto; }
      .tree-item { padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 13px; word-break: break-all; }
      .tree-item.active { background: #e6f4ff; color: #1677ff; font-weight: 600; }
      .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
      .toolbar .field { min-width: 180px; flex: 1; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 8px 4px; font-size: 13px; text-align: left; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
      th { background: #fafafa; }
      .pathbar { margin-bottom: 12px; font-size: 13px; }
      .preview-panel { margin-top: 16px; }
      .preview-box { border: 1px solid #eee; background: #fafafa; padding: 12px; border-radius: 6px; }
      .preview-box pre { white-space: pre-wrap; word-break: break-word; margin: 0; font-size: 13px; }
      .preview-box img { max-width: 100%; max-height: 480px; display: block; margin: 0 auto; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div><strong id="welcome">我的云盘</strong></div>
      <button class="link" onclick="location.href='/index.html'">退出登录</button>
    </div>

    <div class="layout">
      <div>
        <div class="card">
          <div style="font-size:14px; font-weight:600;">目录树</div>
          <div class="muted" style="margin-top:6px;">点击目录切换；支持新建、重命名、移动文件/文件夹。</div>
          <ul id="treeList" class="tree-list"></ul>
        </div>
      </div>

      <div>
        <div class="card">
          <div style="font-size:14px; margin-bottom:10px;">上传本地文件</div>
          <div class="toolbar">
            <div class="field"><input id="localFile" type="file" accept=".txt,.md,.pdf,.png,.jpg,.jpeg,.gif,.zip" /></div>
            <div class="field"><input id="localFilePath" type="text" placeholder="保存路径（留空则上传到当前目录并使用原文件名）" /></div>
            <div><button class="secondary" onclick="uploadLocalFile()">上传</button></div>
          </div>
          <div class="muted">支持格式：txt / md / pdf / png / jpg / jpeg / gif / zip，单文件最大 20MB，用户总配额 200MB。</div>
          <div id="localUploadMsg" class="msg" style="display:none;"></div>
        </div>

        <div class="card">
          <div class="toolbar">
            <div class="field"><input id="newFolderName" type="text" placeholder="在当前目录新建文件夹" /></div>
            <div><button class="primary" onclick="createFolder()">新建文件夹</button></div>
            <div><button class="primary" onclick="goParentDir()">返回上级</button></div>
            <div><button class="primary" onclick="refreshAll()">刷新</button></div>
          </div>
          <div id="folderMsg" class="msg" style="display:none;"></div>

          <div class="pathbar">当前目录：<strong id="currentDirLabel">/</strong></div>

          <table id="fileTable">
            <thead>
              <tr><th>名称</th><th>路径</th><th>大小</th><th>更新时间</th><th>类型</th><th>操作</th></tr>
            </thead>
            <tbody></tbody>
          </table>
          <div id="listMsg" class="msg" style="display:none;"></div>

          <div class="preview-panel">
            <div style="font-size:14px; margin-bottom:8px;">在线预览</div>
            <div id="previewEmpty" class="muted">选择“查看”可在线预览 txt / md / png / jpg / jpeg / gif。</div>
            <div id="previewText" class="preview-box" style="display:none;"><pre id="previewTextContent"></pre></div>
            <div id="previewImage" class="preview-box" style="display:none;"><img id="previewImageContent" alt="图片预览" /></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentDir = '';
      let directoryItems = [];

      async function init() {
        try {
          const resp = await fetch('/api/me');
          if (!resp.ok) {
            location.href = '/index.html';
            return;
          }
          const data = await resp.json();
          if (data.ok) document.getElementById('welcome').textContent = '我的云盘 - ' + data.username;
        } catch (e) {
          location.href = '/index.html';
          return;
        }
        await refreshAll();
      }

      async function refreshAll() {
        await loadTree();
        await loadFiles(currentDir);
      }

      async function loadTree() {
        const resp = await fetch('/api/files/tree');
        const data = await resp.json();
        directoryItems = data.items || [];
        const list = document.getElementById('treeList');
        list.innerHTML = '';
        directoryItems.forEach(item => {
          const li = document.createElement('li');
          li.className = 'tree-item' + (item.path === currentDir ? ' active' : '');
          li.textContent = item.path ? '📁 ' + item.path : '📁 /';
          li.addEventListener('click', function () {
            currentDir = item.path || '';
            loadFiles(currentDir);
            renderTree();
          });
          list.appendChild(li);
        });
      }

      function renderTree() {
        const list = document.getElementById('treeList');
        Array.from(list.children).forEach((node, idx) => {
          const item = directoryItems[idx];
          node.className = 'tree-item' + (item && item.path === currentDir ? ' active' : '');
        });
      }

      async function loadFiles(dir) {
        currentDir = dir || '';
        document.getElementById('currentDirLabel').textContent = currentDir || '/';
        renderTree();
        const msg = document.getElementById('listMsg');
        msg.style.display = 'none';
        const tbody = document.querySelector('#fileTable tbody');
        tbody.innerHTML = '';
        try {
          const resp = await fetch('/api/files/list', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dir: currentDir, page: 1, page_size: 200 })
          });
          const data = await resp.json();
          if (!resp.ok || !data.ok) throw new Error('加载失败');
          (data.items || []).forEach(item => tbody.appendChild(buildRow(item)));
        } catch (e) {
          msg.textContent = '加载文件列表失败';
          msg.className = 'msg error';
          msg.style.display = 'block';
        }
      }

      function buildRow(item) {
        const tr = document.createElement('tr');
        [item.is_dir ? ('📁 ' + (item.name || '')) : (item.name || ''), item.path || '', item.is_dir ? '-' : String(item.size || 0), formatTimestamp(item.updated_at), item.content_type || ''].forEach(text => {
          const td = document.createElement('td');
          td.textContent = text;
          tr.appendChild(td);
        });

        const actionTd = document.createElement('td');
        if (item.is_dir) {
          actionTd.appendChild(linkButton('打开', () => loadFiles(item.path || '')));
          actionTd.appendChild(document.createTextNode(' '));
          actionTd.appendChild(linkButton('重命名', () => renameEntry(item.path || '', item.name || '')));
          actionTd.appendChild(document.createTextNode(' '));
          actionTd.appendChild(linkButton('移动', () => moveEntry(item.path || '')));
        } else {
          if (item.previewable) {
            actionTd.appendChild(linkButton('查看', () => previewFile(item.path || '', item.preview_kind || '')));
            actionTd.appendChild(document.createTextNode(' '));
          }
          actionTd.appendChild(linkButton('下载', () => rawDownloadFile(item.path || '')));
          actionTd.appendChild(document.createTextNode(' '));
          actionTd.appendChild(linkButton('重命名', () => renameEntry(item.path || '', item.name || '')));
          actionTd.appendChild(document.createTextNode(' '));
          actionTd.appendChild(linkButton('移动', () => moveEntry(item.path || '')));
          actionTd.appendChild(document.createTextNode(' '));
          const del = document.createElement('button');
          del.className = 'danger';
          del.textContent = '删除';
          del.addEventListener('click', () => deleteFile(item.path || ''));
          actionTd.appendChild(del);
        }
        tr.appendChild(actionTd);
        return tr;
      }

      function linkButton(text, onClick) {
        const btn = document.createElement('button');
        btn.className = 'link';
        btn.textContent = text;
        btn.addEventListener('click', onClick);
        return btn;
      }

      async function createFolder() {
        const input = document.getElementById('newFolderName');
        const name = input.value.trim();
        if (!name) return showMsg('folderMsg', '请输入文件夹名', true);
        const path = currentDir ? currentDir + '/' + name : name;
        const ok = await postJson('/api/files/create-folder', { path }, 'folderMsg', '文件夹创建成功');
        if (!ok) return;
        input.value = '';
        await refreshAll();
      }

      async function renameEntry(oldPath, oldName) {
        const nextName = prompt('输入新的名称', oldName || '');
        if (!nextName || nextName === oldName) return;
        const parent = parentDir(oldPath);
        const newPath = parent ? (parent + '/' + nextName) : nextName;
        const ok = await postJson('/api/files/rename', { old_path: oldPath, new_path: newPath }, 'listMsg', '重命名成功');
        if (!ok) return;
        if (currentDir === oldPath) currentDir = newPath;
        await refreshAll();
      }

      async function moveEntry(path) {
        const target = prompt('输入目标目录，根目录请留空', currentDir);
        if (target === null) return;
        const ok = await postJson('/api/files/move', { path, target_dir: target.trim() }, 'listMsg', '移动成功');
        if (!ok) return;
        await refreshAll();
      }

      async function deleteFile(path) {
        if (!confirm('确定删除 ' + path + ' ?')) return;
        const ok = await postJson('/api/files/delete', { path }, 'listMsg', '删除成功');
        if (!ok) return;
        await refreshAll();
      }

      async function postJson(url, body, msgId, successText) {
        const msg = document.getElementById(msgId);
        msg.style.display = 'none';
        try {
          const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
          if (!resp.ok) throw new Error(await resp.text());
          msg.textContent = successText;
          msg.className = 'msg success';
          msg.style.display = 'block';
          return true;
        } catch (e) {
          msg.textContent = (e && e.message) ? e.message : '请求失败';
          msg.className = 'msg error';
          msg.style.display = 'block';
          return false;
        }
      }

      async function previewFile(path, previewKind) {
        resetPreview();
        if (previewKind === 'image') {
          document.getElementById('previewEmpty').style.display = 'none';
          const img = document.getElementById('previewImageContent');
          img.onload = function () {
            document.getElementById('previewImage').style.display = 'block';
            img.onload = null; img.onerror = null;
          };
          img.onerror = function () {
            img.onload = null; img.onerror = null; resetPreview(); alert('图片预览失败');
          };
          img.src = '/api/files/raw-download?path=' + encodeURIComponent(path) + '&preview=1&_t=' + Date.now();
          return;
        }
        try {
          const resp = await fetch('/api/files/download', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path }) });
          if (!resp.ok) throw new Error(await resp.text());
          const data = await resp.json();
          document.getElementById('previewEmpty').style.display = 'none';
          document.getElementById('previewTextContent').textContent = data.content || '';
          document.getElementById('previewText').style.display = 'block';
        } catch (e) {
          alert('文本预览失败');
        }
      }

      async function uploadLocalFile() {
        const input = document.getElementById('localFile');
        const customPath = document.getElementById('localFilePath').value.trim();
        if (!input.files || input.files.length === 0) {
          showMsg('localUploadMsg', '请选择一个本地文件', true);
          return;
        }
        const file = input.files[0];
        const path = customPath || (currentDir ? currentDir + '/' + file.name : file.name);
        const form = new FormData();
        form.append('path', path);
        form.append('file', file, file.name);
        try {
          const resp = await fetch('/api/files/upload-local', { method: 'POST', body: form });
          if (!resp.ok) throw new Error(await resp.text());
          showMsg('localUploadMsg', '本地文件上传成功', false);
          input.value = '';
          document.getElementById('localFilePath').value = '';
          await refreshAll();
        } catch (e) {
          showMsg('localUploadMsg', (e && e.message) ? e.message : '上传失败', true);
        }
      }

      function rawDownloadFile(path) {
        location.href = '/api/files/raw-download?path=' + encodeURIComponent(path);
      }

      function goParentDir() {
        currentDir = parentDir(currentDir);
        loadFiles(currentDir);
      }

      function parentDir(path) {
        if (!path) return '';
        const idx = path.lastIndexOf('/');
        return idx === -1 ? '' : path.slice(0, idx);
      }

      function resetPreview() {
        const img = document.getElementById('previewImageContent');
        img.onload = null; img.onerror = null;
        document.getElementById('previewEmpty').style.display = 'block';
        document.getElementById('previewText').style.display = 'none';
        document.getElementById('previewImage').style.display = 'none';
        document.getElementById('previewTextContent').textContent = '';
        img.removeAttribute('src');
      }

      function showMsg(id, text, isError) {
        const msg = document.getElementById(id);
        msg.textContent = text;
        msg.className = 'msg ' + (isError ? 'error' : 'success');
        msg.style.display = 'block';
      }

      function formatTimestamp(ts) {
        if (!ts) return '';
        const d = new Date(Number(ts) * 1000);
        return Number.isNaN(d.getTime()) ? String(ts) : d.toLocaleString();
      }

      init();
    </script>
  </body>
</html>
